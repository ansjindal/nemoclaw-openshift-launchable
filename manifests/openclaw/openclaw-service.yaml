# Service fronting the OpenClaw gateway pod (the Sandbox labels its pod sandbox=openclaw-sandbox).
apiVersion: v1
kind: Service
metadata:
  name: openclaw
  labels:
    app.kubernetes.io/name: openclaw
spec:
  selector:
    sandbox: openclaw-sandbox
  ports:
    - name: gateway
      port: 18789
      # Target the in-pod loopback-proxy (:18788), not the gateway (:18789) directly — that
      # makes clients look "local" so the Control UI auto-pairs (no device-pairing prompt).
      targetPort: 18788
