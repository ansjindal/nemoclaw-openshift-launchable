# OpenClaw agent as an agent-sandbox Sandbox on MicroShift. The agent-sandbox controller
# reconciles this into an OpenClaw gateway pod. The gateway config is SEEDED from the
# openclaw-config Secret into a writable copy at boot (so the OpenClaw UI can edit it); the
# gateway PASSWORD comes from the openclaw-gateway-password Secret. Both are created by
# 45-openclaw.sh. Model config is OPTIONAL: with inference creds in .env the agent is
# pre-configured; without, it boots unconfigured and the user onboards a model in the UI.
#
# Auth UX: the gateway runs --auth password with a fixed (known) password so workshop users
# don't have to copy a random token. A pair-approver sidecar auto-approves device pairing
# (remote clients aren't auto-trusted as "local"), so users only ever enter the password.
apiVersion: agents.x-k8s.io/v1beta1
kind: Sandbox
metadata:
  name: openclaw-sandbox
spec:
  podTemplate:
    metadata:
      labels:
        sandbox: openclaw-sandbox
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      # Seed the agent's identity/soul/kickoff into the workspace BEFORE the gateway boots,
      # so the agent comes online already knowing who it is (no "who am I" interview).
      # cp -n = don't clobber: fresh PVC gets the workshop persona; attendee edits survive
      # restarts. Files come from the openclaw-workspace-seed ConfigMap (45-openclaw.sh).
      initContainers:
        - name: seed-workspace
          image: ghcr.io/openclaw/openclaw:2026.6.10
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - |
              # identity/soul/kickoff → workspace PVC (create-if-missing; survives restarts)
              for f in IDENTITY.md SOUL.md BOOTSTRAP.md; do
                [ -f "/seed/$f" ] && cp -n "/seed/$f" "/workspace/$f" || true
              done
              # gateway config → writable config dir so the OpenClaw UI can edit/save it
              # (read from the openclaw-config Secret seed; not kept in the workspace git).
              cp -f /etc/openclaw-seed/openclaw.json /openclaw-home/openclaw.json 2>/dev/null || true
              echo "workspace:"; ls -1 /workspace; echo "config:"; ls -1 /openclaw-home
          volumeMounts:
            - mountPath: /workspace
              name: workspaces-pvc
            - mountPath: /seed
              name: workspace-seed
              readOnly: true
            - mountPath: /openclaw-home
              name: config-volume
            - mountPath: /etc/openclaw-seed
              name: cm-volume
              readOnly: true
      containers:
        - name: openclaw
          image: ghcr.io/openclaw/openclaw:2026.6.10
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            runAsNonRoot: true
            capabilities:
              drop:
                - ALL
          env:
            # Writable copy (seeded by the initContainer from the openclaw-config Secret) so
            # the OpenClaw UI's onboarding can save a provider/model/key the user enters.
            - name: OPENCLAW_CONFIG_PATH
              value: "/home/node/.openclaw/openclaw.json"
            # Password via env (not --password-file): secret volumes mount as symlinks,
            # and OpenClaw refuses a symlinked password file. The gateway reads
            # OPENCLAW_GATEWAY_PASSWORD when --auth password is set.
            - name: OPENCLAW_GATEWAY_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: openclaw-gateway-password
                  key: password
          command:
            - node
            - dist/index.js
            - gateway
            - --bind=lan
            - --port
            - "18789"
            - --allow-unconfigured
            # Fixed-password auth: users type the known password (from .env, surfaced by
            # 45-openclaw.sh) instead of copying a random per-deploy token.
            - --auth
            - password
            - --verbose
          ports:
            - containerPort: 18789
            - containerPort: 18790
          volumeMounts:
            - mountPath: /home/node/.openclaw/workspace
              name: workspaces-pvc
            - mountPath: /home/node/.openclaw
              name: config-volume
          # (cm-volume is mounted only in the initContainer now — it seeds the writable
          #  config copy above; the gateway no longer reads the read-only Secret directly.)
        # Loopback hop for zero-friction pairing. OpenClaw 2026.6.10 silently auto-pairs a
        # *local* Control-UI client (incl. scope/role upgrades) but prompts for "device
        # pairing" on remote ones. External traffic arrives via NodePort -> kube-proxy, so the
        # gateway sees it as remote. This sidecar (same pod = shared localhost) listens on
        # :18788 and forwards to the gateway on 127.0.0.1:18789, so every client looks local
        # and auto-pairs. The fixed password (--auth password) stays the only user-facing step.
        # The Services target :18788 (this proxy), not the gateway's :18789, so all external
        # connections take the loopback hop.
        - name: loopback-proxy
          image: ghcr.io/openclaw/openclaw:2026.6.10
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            runAsNonRoot: true
            capabilities:
              drop:
                - ALL
          command:
            - node
            - -e
            - |
              const net = require('net');
              net.createServer((c) => {
                const u = net.connect(18789, '127.0.0.1');
                c.pipe(u); u.pipe(c);
                const end = () => { c.destroy(); u.destroy(); };
                c.on('error', end); u.on('error', end);
              }).listen(18788, '0.0.0.0', () => console.log('loopback-proxy :18788 -> 127.0.0.1:18789'));
          ports:
            - containerPort: 18788
      volumes:
        - name: workspace-seed
          configMap:
            name: openclaw-workspace-seed
            optional: true
        - name: config-volume
          emptyDir: {}
        - name: cm-volume
          secret:                       # Secret (holds the API key), not a ConfigMap
            secretName: openclaw-config
            items:
              - key: openclaw.json
                path: openclaw.json
  volumeClaimTemplates:
    - metadata:
        name: workspaces-pvc
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 2Gi
