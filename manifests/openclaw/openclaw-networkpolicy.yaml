# Deny-by-default egress policy for the OpenClaw sandbox pod (OpenShift-native, L4).
# VERIFIED enforced on this cluster (kindnet): DNS + intra-cluster + external HTTPS work;
# all other external egress (plaintext :80, :22, arbitrary ports) is blocked. An agent turn
# to the remote inference endpoint still succeeds.
#
# This is the Kubernetes-enforceable counterpart of policies/openclaw-sandbox.yaml — that
# file is OpenShell's L7 schema (per-binary/method/path) and is only enforced under
# OpenShell's supervisor. Vanilla OpenClaw-as-agent-sandbox is governed at L4 here.
#
# kindnet quirks this layout works around:
#   • ipBlock matches EXTERNAL IPs only — in-cluster peers (incl. the DNS ClusterIP) are NOT
#     matched by ipBlock, so cluster traffic is allowed via an explicit cluster-CIDR rule.
#   • egress is evaluated against the DNS ClusterIP (10.43.0.10) pre-DNAT, so namespaceSelector
#     (which matches pod IPs) does not cover it — hence the service-CIDR allow.
#   • Egress-only: kindnet isn't stateful for UDP, so an Ingress deny would drop DNS replies.
# Adjust the CIDRs if your cluster uses non-default pod/service ranges.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: openclaw-deny-by-default
  labels:
    app.kubernetes.io/name: openclaw
spec:
  podSelector:
    matchLabels:
      sandbox: openclaw-sandbox
  policyTypes:
    - Egress
  egress:
    # Intra-cluster (pod CIDR + service CIDR) — covers cluster DNS via the dns-default ClusterIP.
    - to:
        - ipBlock: { cidr: 10.42.0.0/16 }   # pod CIDR
        - ipBlock: { cidr: 10.43.0.0/16 }   # service CIDR (DNS ClusterIP 10.43.0.10)
    # External HTTPS only — reaches the remote inference endpoint (and registries).
    # Everything else leaving the cluster (other ports/protocols) is denied.
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
            except: [ 10.42.0.0/16, 10.43.0.0/16 ]
      ports:
        - { protocol: TCP, port: 443 }
