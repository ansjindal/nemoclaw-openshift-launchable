# NodePort for the OpenClaw UI, served at ROOT (no subdomain / no subpath needed).
# Use this for browser access WITHOUT DNS: reach http://<node-ip>:30789/ directly, or
# `ssh <instance> -L 30789:<node-ip>:30789` then http://localhost:30789/.
# (Routes need DNS hostnames; NodePort-at-root does not. OpenClaw can't serve under a subpath,
# so a single-host subpath scheme via Gateway API/Routes is not an option for it.)
apiVersion: v1
kind: Service
metadata:
  name: openclaw-nodeport
  namespace: openclaw
  labels:
    app.kubernetes.io/name: openclaw
spec:
  type: NodePort
  selector:
    sandbox: openclaw-sandbox
  ports:
    - name: ui
      port: 18789
      # → in-pod loopback-proxy (:18788) so the gateway sees clients as local and the
      #   Control UI auto-pairs (no device-pairing prompt); password is the only step.
      targetPort: 18788
      nodePort: 30789
