# Standalone OpenShift/OKD web console for MicroShift (which ships no console).
#
# ⚠️ SECURITY: MicroShift has no OAuth server, so this runs with auth DISABLED and a
# cluster-admin ServiceAccount, exposed via a Route — i.e. an UNAUTHENTICATED admin console
# reachable over the network. Use ONLY on an ephemeral workshop instance. For anything
# real, front it with an authenticating proxy (oauth2-proxy) or don't expose it.
apiVersion: v1
kind: Namespace
metadata:
  name: openshift-console
  labels:
    # The console image isn't restricted-PSA compliant; allow privileged in this ns.
    pod-security.kubernetes.io/enforce: privileged
    pod-security.kubernetes.io/warn: privileged
    pod-security.kubernetes.io/audit: privileged
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: console
  namespace: openshift-console
---
# Non-expiring service-account token for the console SA. With --user-auth=disabled the
# bridge needs a STATIC user bearer token (it no longer falls back to the in-cluster SA
# token) — without it the UI shows "Please configure authentication". This legacy-style
# token Secret is auto-populated by the token controller and injected as
# BRIDGE_K8S_AUTH_BEARER_TOKEN below, making the cluster-admin console SA the implicit user.
apiVersion: v1
kind: Secret
metadata:
  name: console-sa-token
  namespace: openshift-console
  annotations:
    kubernetes.io/service-account.name: console
type: kubernetes.io/service-account-token
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: console-cluster-admin
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-admin
subjects:
  - kind: ServiceAccount
    name: console
    namespace: openshift-console
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: console
  namespace: openshift-console
spec:
  replicas: 1
  selector:
    matchLabels:
      app: console
  template:
    metadata:
      labels:
        app: console
    spec:
      serviceAccountName: console
      containers:
        - name: console
          image: quay.io/openshift/origin-console:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 9000
          env:
            - { name: BRIDGE_K8S_MODE, value: "in-cluster" }
            - { name: BRIDGE_USER_AUTH, value: "disabled" }
            # Static user token required when user-auth is disabled (see Secret above).
            - name: BRIDGE_K8S_AUTH_BEARER_TOKEN
              valueFrom:
                secretKeyRef:
                  name: console-sa-token
                  key: token
            - { name: BRIDGE_K8S_MODE_OFF_CLUSTER_SKIP_VERIFY_TLS, value: "true" }
            - { name: BRIDGE_LISTEN, value: "http://0.0.0.0:9000" }
            - { name: BRIDGE_BRANDING, value: "okd" }
            # Serve the console under /console/ so it can sit behind the router on a
            # shared host as a PATH (not its own host). The bridge's base-path flag
            # requires a value that starts AND ends with a slash. The router forwards
            # the path unchanged and the console's native base-path support rewrites
            # its own asset/API/websocket URLs — so no proxy shim is needed here
            # (this only works because the console, unlike OpenClaw, supports a base path).
            - { name: BRIDGE_BASE_PATH, value: "/console/" }
apiVersion: v1
kind: Service
metadata:
  name: console
  namespace: openshift-console
spec:
  selector:
    app: console
  ports:
    - port: 9000
      targetPort: 9000
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: console
  namespace: openshift-console
spec:
  # Path-based: the console is reached at https://<route-host>/console/ on the
  # shared router host. PathPrefix /console matches /console and everything under it.
  # (Path routing is supported on edge/reencrypt/insecure routes, not passthrough.)
  path: /console
  to:
    kind: Service
    name: console
  port:
    targetPort: 9000
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
