# DNS-free NodePort fallback for the OpenShift/OKD console. The console now serves under
# /console/ (BRIDGE_BASE_PATH on the Deployment), so reach it at http://<node-ip>:30900/console/
# or `ssh <instance> -L 30900:<node-ip>:30900` then http://localhost:30900/console/.
# Primary access is the path-based Route (https://<route-host>/console/ via the router).
# If console redirects/assets misbehave under a forwarded host:port, set BRIDGE_BASE_ADDRESS
# on the console Deployment to the URL you browse from (e.g. http://localhost:30900).
apiVersion: v1
kind: Service
metadata:
  name: console-nodeport
  namespace: openshift-console
  labels:
    app: console
spec:
  type: NodePort
  selector:
    app: console
  ports:
    - name: ui
      port: 9000
      targetPort: 9000
      nodePort: 30900
