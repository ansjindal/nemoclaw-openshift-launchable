# OpenShift Route exposing the OpenShell gateway (and thus the OpenClaw endpoint it fronts).
# The gateway terminates its own mTLS and speaks gRPC/HTTP2, so the Route uses passthrough
# TLS (edge/reencrypt would break the client-cert mTLS the gateway requires).
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: openshell-gateway
  namespace: openshell
  labels:
    app.kubernetes.io/name: openshell
  annotations:
    haproxy.router.openshift.io/timeout: "300s"
spec:
  to:
    kind: Service
    name: openshell
    weight: 100
  port:
    targetPort: 8080
  tls:
    termination: passthrough
    insecureEdgeTerminationPolicy: None
