<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 640" font-family="Trebuchet MS, Verdana, Segoe UI, Helvetica, sans-serif">
  <defs>
    <marker id="ar" markerWidth="10" markerHeight="10" refX="7" refY="3.2" orient="auto">
      <path d="M0,0 L8,3.2 L0,6.4 Z" fill="#3a3a4d"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="880" height="640" rx="16" fill="#f7f8fb"/>
  <text x="440" y="34" font-size="20" fill="#3a3a4d" text-anchor="middle" font-weight="700">NemoClaw-on-OpenShift launchable — architecture</text>

  <!-- 1 Brev VM -->
  <rect x="70" y="52" width="740" height="60" rx="12" fill="#edeef2" stroke="#5b6b7d" stroke-width="1.6"/>
  <circle cx="96" cy="82" r="13" fill="#5b6b7d" stroke="#fff" stroke-width="1.7"/><text x="96" y="86.6" font-size="13" fill="#fff" text-anchor="middle" font-weight="700">1</text>
  <text x="122" y="79" font-size="15" fill="#3a3a4d" font-weight="700">NVIDIA Brev — Ubuntu VM</text>
  <text x="122" y="97" font-size="11.5" fill="#5b5d70">1 CPU instance · no GPU · no nested virt · your free credits</text>
  <rect x="612" y="71" width="132" height="22" rx="11" fill="#76b9001c" stroke="#76b900"/><text x="678" y="86" font-size="11" fill="#76b900" text-anchor="middle" font-weight="700">NVIDIA Brev</text>
  <path d="M440,112 L440,128" stroke="#3a3a4d" stroke-width="2" marker-end="url(#ar)"/>

  <!-- 2 podman -->
  <rect x="70" y="128" width="740" height="56" rx="12" fill="#e7effb" stroke="#6f8fd0" stroke-width="1.6"/>
  <circle cx="96" cy="156" r="13" fill="#6f8fd0" stroke="#fff" stroke-width="1.7"/><text x="96" y="160.6" font-size="13" fill="#fff" text-anchor="middle" font-weight="700">2</text>
  <text x="122" y="152" font-size="15" fill="#3a3a4d" font-weight="700">podman</text>
  <text x="122" y="170" font-size="11.5" fill="#5b5d70">runs MicroShift as a container (MINC) — no bare metal needed</text>
  <path d="M440,184 L440,200" stroke="#3a3a4d" stroke-width="2" marker-end="url(#ar)"/>

  <!-- 3 MicroShift / OpenShift -->
  <rect x="70" y="200" width="740" height="64" rx="12" fill="#fde7e7" stroke="#ee0000" stroke-width="1.6"/>
  <circle cx="96" cy="232" r="13" fill="#ee0000" stroke="#fff" stroke-width="1.7"/><text x="96" y="236.6" font-size="13" fill="#fff" text-anchor="middle" font-weight="700">3</text>
  <text x="122" y="227" font-size="15" fill="#3a3a4d" font-weight="700">MicroShift — single-node OpenShift (OKD)</text>
  <text x="122" y="245" font-size="11.5" fill="#5b5d70">same OpenShift APIs &amp; oc · router on :9443 · CRI-O + CNI + storage</text>
  <rect x="612" y="221" width="132" height="22" rx="11" fill="#ee00001c" stroke="#ee0000"/><text x="678" y="236" font-size="11" fill="#ee0000" text-anchor="middle" font-weight="700">Red Hat</text>
  <path d="M440,264 L440,280" stroke="#3a3a4d" stroke-width="2" marker-end="url(#ar)"/>

  <!-- 4 OpenShell -->
  <rect x="70" y="280" width="740" height="64" rx="12" fill="#e9e5fb" stroke="#7c3aed" stroke-width="1.6"/>
  <circle cx="96" cy="312" r="13" fill="#7c3aed" stroke="#fff" stroke-width="1.7"/><text x="96" y="316.6" font-size="13" fill="#fff" text-anchor="middle" font-weight="700">4</text>
  <text x="122" y="307" font-size="15" fill="#3a3a4d" font-weight="700">OpenShell gateway</text>
  <text x="122" y="325" font-size="11.5" fill="#5b5d70">the sandbox control plane · watches the agent-sandbox CRD</text>
  <rect x="612" y="301" width="132" height="22" rx="11" fill="#76b9001c" stroke="#76b900"/><text x="678" y="316" font-size="11" fill="#76b900" text-anchor="middle" font-weight="700">NVIDIA</text>
  <path d="M440,344 L440,360" stroke="#3a3a4d" stroke-width="2" marker-end="url(#ar)"/>

  <!-- 5 OpenClaw (Shifty) -->
  <rect x="70" y="360" width="740" height="72" rx="12" fill="#eef6e0" stroke="#76b900" stroke-width="1.6"/>
  <circle cx="96" cy="396" r="13" fill="#76b900" stroke="#fff" stroke-width="1.7"/><text x="96" y="400.6" font-size="13" fill="#fff" text-anchor="middle" font-weight="700">5</text>
  <text x="122" y="389" font-size="15" fill="#3a3a4d" font-weight="700">OpenClaw sandbox — “Shifty” 🦞</text>
  <text x="122" y="407" font-size="11.5" fill="#5b5d70">the agent + control UI (:18789) · password auth · pairing auto-approved</text>
  <text x="122" y="423" font-size="11.5" fill="#5b5d70">pre-seeded IDENTITY.md / SOUL.md · pair-approver sidecar</text>
  <path d="M440,432 L440,448" stroke="#3a3a4d" stroke-width="2" marker-end="url(#ar)"/>

  <!-- 6 remote inference -->
  <rect x="70" y="448" width="740" height="56" rx="12" fill="#e3f0ea" stroke="#16a34a" stroke-width="1.6"/>
  <circle cx="96" cy="476" r="13" fill="#16a34a" stroke="#fff" stroke-width="1.7"/><text x="96" y="480.6" font-size="13" fill="#fff" text-anchor="middle" font-weight="700">6</text>
  <text x="122" y="472" font-size="15" fill="#3a3a4d" font-weight="700">Remote inference endpoint</text>
  <text x="122" y="490" font-size="11.5" fill="#5b5d70">OpenAI-compatible model (e.g. NVIDIA NIM / build.nvidia.com) — agent calls out</text>

  <!-- exposure band -->
  <rect x="70" y="524" width="740" height="92" rx="12" fill="#ffffff" stroke="#b9bccd" stroke-width="1.4" stroke-dasharray="6 4"/>
  <text x="440" y="548" font-size="12.5" fill="#3a3a4d" text-anchor="middle" font-weight="700">How you reach it — published on the host → your Brev URL</text>
  <text x="210" y="576" font-size="11.5" fill="#3a3a4d" text-anchor="middle" font-weight="700">OpenClaw UI</text>
  <text x="210" y="593" font-size="11" fill="#5b5d70" text-anchor="middle">NodePort :30789</text>
  <text x="440" y="576" font-size="11.5" fill="#3a3a4d" text-anchor="middle" font-weight="700">OpenShift console</text>
  <text x="440" y="593" font-size="11" fill="#5b5d70" text-anchor="middle">NodePort :30900/console/</text>
  <text x="670" y="576" font-size="11.5" fill="#3a3a4d" text-anchor="middle" font-weight="700">OpenShell gateway</text>
  <text x="670" y="593" font-size="11" fill="#5b5d70" text-anchor="middle">Route via :9443</text>
</svg>
