# OpenShell gateway on OpenShift/MicroShift — OFFICIAL OpenShift overrides.
# Per the chart's "install-on-openshift" section + docs.nvidia.com/openshell/kubernetes/setup.
# The chart IS the Kubernetes compute driver (gateway runs in-cluster, creates sandbox pods
# via the agent-sandbox CRD). These overrides let OpenShift's SCC assign UID/fsGroup from the
# namespace range instead of the chart's hardcoded 1000 — the supported OpenShift posture.

# Expose the gateway on a stable NodePort so the in-VM workshop shell's `openshell` CLI
# has a fixed endpoint (it reconnects per command; `kubectl port-forward` isn't stable).
# Phase 50's socat forwarder publishes 30808 on the host; phase 70 registers the CLI
# against http://127.0.0.1:30808. (Single-node = NodePort; production would front it
# with an ingress / Gateway API + TLS instead.)
service:
  type: NodePort
  port: 8080
  nodePort: 30808

server:
  # TLS terminated at the edge (Route); gateway listens plaintext in-cluster.
  disableTls: true
  logLevel: info
  # DEV/WORKSHOP ONLY: accept unauthenticated CLI calls so gateway-driven creation
  # (`openshell sandbox create`) works without OIDC/Keycloak. Not for production.
  auth:
    allowUnauthenticatedUsers: true
  # The image each gateway-created sandbox pod runs (the OpenShell sandbox runtime).
  sandboxImage: ghcr.io/ansjindal/openclaw-sandbox:2026.6.10
  sandboxImagePullPolicy: IfNotPresent
  # Sandbox pods land in the release namespace (openshell) when empty — follow the
  # official default; the chart only creates sandbox RBAC inside it.
  sandboxNamespace: ""
  # Gateway callback endpoint each sandbox's supervisor dials to exchange its
  # bootstrap token (IssueSandboxToken). Leave EMPTY so the chart DERIVES it from
  # namespace + service + disableTls (http://openshell.openshell.svc.cluster.local:8080).
  # Hardcoding without a scheme — or leaving the chart default — breaks the supervisor
  # bootstrap exchange ("supervisor session not connected" / CrashLoopBackOff).
  grpcEndpoint: ""
  # No local GPU in this topology — leave runtimeClassName empty (CPU sandboxes).
  defaultRuntimeClassName: ""
  sandboxJwt:
    # On OpenShift the gateway runs as a random namespace-range UID (we null the
    # securityContext), which does NOT own the JWT signing-key Secret. The default mount
    # mode 0400 (owner-read only) then yields "Permission denied" reading signing.pem and
    # the gateway crash-loops. 0444 makes the key world-readable so any assigned UID can
    # read it. (Per the chart's own sandboxJwt.secretDefaultMode guidance.)
    secretDefaultMode: "0444"

# Let OpenShift's SCC assign these (do NOT hardcode UID/fsGroup on OpenShift).
podSecurityContext:
  fsGroup: null
securityContext:
  runAsUser: null

# How the openshell-sandbox supervisor binary is delivered into each sandbox pod.
#   image-volume  -> Kubernetes 1.33+ (chart default on newer clusters)
#   init-container -> broadest compatibility; required on MicroShift (older kube)
# Wrong method here yields a supervisor that can't complete its bootstrap exchange.
supervisor:
  sideloadMethod: init-container

# Restrict SSH ingress on sandbox pods to the gateway (chart default).
networkPolicy:
  enabled: true
