# Grafana Loki — single-binary, filesystem backend. Plenty for one node.
deploymentMode: SingleBinary
loki:
  auth_enabled: false
  commonConfig:
    replication_factor: 1
  storage:
    type: filesystem
  schemaConfig:
    configs:
      - from: "2024-01-01"
        store: tsdb
        object_store: filesystem
        schema: v13
        index: { prefix: loki_index_, period: 24h }
  # Keep it light on a shared node.
  limits_config:
    retention_period: 72h
singleBinary:
  replicas: 1
  persistence:
    enabled: true
    storageClass: local-path
    size: 5Gi
  resources:
    requests: { cpu: 100m, memory: 256Mi }
# Disable the extra microservice components (we're single-binary).
backend: { replicas: 0 }
read: { replicas: 0 }
write: { replicas: 0 }
chunksCache:
  enabled: false
resultsCache:
  enabled: false
gateway:
  enabled: false
lokiCanary:
  enabled: false
test:
  enabled: false
