# OpenClaw agent egress policy — for a gateway-created OpenShell sandbox.
#
# This is the REAL OpenShell sandbox-policy schema (see the shipped
# /etc/openshell/policy.yaml): `network_policies` is a MAP keyed by id, each binary
# is a `{ path: ... }` object, and simple allows are bare `{ host, port }` (L4 tunnel).
# OpenShell is deny-by-default — a gateway sandbox can reach ONLY the hosts below,
# and ONLY via the listed binaries.
#
# NOTE: a gateway sandbox is network-SEALED from the in-cluster Kubernetes API by the
# supervisor (egress proxy routes to the internet only). That is by design — these
# agents do governed EXTERNAL work, not in-cluster reads.
#
# INFERENCE: the agent sends its thinking to https://inference.local — a virtual host the
# supervisor intercepts BEFORE policy evaluation and routes to the gateway's configured
# inference provider (`openshell provider create` + `openshell inference set`). The gateway
# holds the real endpoint + key and makes the upstream call, so the real inference host
# needs NO entry here and the agent never sees the key. That's the OpenShell privacy router.

version: 1

filesystem_policy:
  include_workdir: true
  read_only:
    - /usr
    - /lib
    - /proc
    - /dev/urandom
    - /app
    - /etc
    - /var/log
  read_write:
    - /sandbox
    - /tmp
    - /dev/null

landlock:
  compatibility: best_effort

process:
  run_as_user: sandbox
  run_as_group: sandbox

network_policies:
  # Inference is NOT listed here — the agent reaches the model via https://inference.local,
  # which the supervisor intercepts before policy is evaluated (see the header note).

  # --- Skill supply chain: ONE governed source ---
  # The agent's ONLY skill+dep egress is our private in-cluster npm registry (Verdaccio,
  # `manifests/openclaw/registry.yaml`), reachable over the cluster network at
  # registry.openshell.svc.cluster.local:4873. Skills enter that registry two ways — authored
  # in-sandbox and published, or vetted-and-mirrored from ClawHub by a curator — and the agent
  # installs only from it. Verdaccio uplinks npmjs and caches transitive deps, so the agent
  # never talks to registry.npmjs.org directly either: a single, auditable chokepoint.
  #
  # ClawHub (clawhub.ai / hub.openclaw.ai) is deliberately ABSENT: the agent cannot pull
  # skills straight from the internet. The skills lesson opens a temporary ClawHub door with
  # `openshell policy update --add-endpoint` to demo edge-vetting, then removes it — this file
  # is the durable, locked posture.
  #
  # npm fetches SCOPED packages as /@scope%2fname — the encoded '/' (%2F). The proxy's path
  # parser rejects %2F unless the endpoint is protocol: rest + allow_encoded_slash: true
  # (NOT settable via the CLI --add-endpoint; it must live here). Scoped names like
  # @workshop/<skill> need it, so the registry endpoint sets it.
  in-cluster-registry:
    name: in-cluster-registry
    endpoints:
      - { host: registry.openshell.svc.cluster.local, port: 4873, access: full, protocol: rest, allow_encoded_slash: true }
    binaries:
      - { path: /usr/bin/node }
      - { path: /usr/local/bin/node }
      - { path: /usr/bin/npm }
      - { path: /usr/local/bin/npm }

  # --- web search (DuckDuckGo, key-free) — the agent scrapes DuckDuckGo's non-JS
  #     search pages, so allow those hosts for node. Enabled via openclaw config
  #     tools.web.search.provider=duckduckgo. ---
  websearch:
    name: websearch
    endpoints:
      - { host: duckduckgo.com, port: 443, access: full }
      - { host: html.duckduckgo.com, port: 443, access: full }
      - { host: lite.duckduckgo.com, port: 443, access: full }
    binaries:
      - { path: /usr/bin/node }
      - { path: /usr/local/bin/node }
