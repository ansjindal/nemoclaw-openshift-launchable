# Example preset — add GitHub access to a running sandbox without recreating it:
#   nemoclaw <sandbox-name> policy-add policies/presets/github.yaml
# (network is hot-reloadable; filesystem/process are not.)
network_policies:
  - name: github
    endpoints:
      - host: api.github.com
        port: 443
        protocol: rest
        enforcement: enforce
      - host: github.com
        port: 443
        protocol: rest
        access: full          # git clone over HTTPS needs raw TLS
    binaries:
      - /usr/bin/git
      - /usr/local/bin/git
      - /usr/bin/node
      - /usr/local/bin/node
    rules:
      - method: GET
        path: /**
      - method: POST
        path: /repos/**
